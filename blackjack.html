<!DOCTYPE html>
<html lang="en">
    <head>
        <style> 
            body {
                background-image: url(Background.png);
                background-repeat: no-repeat;
                background-size: cover;
                background-attachment: fixed;
                }
        </style>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="blackjack.css">
    </head>
    <body>            
        <div id="Button1">
            <a href="index.html">Home</a>
        </div>
        <div id="leftColumn">

            <div id="losses">
                <p id="Losses">Losses: ##</p>
            </div>
            <div id="streak">
                <p id="Streak">Streak: ##</p>
            </div>
            <button id="Hit" class="Actions" onclick="hit()">Hit</button> <button id="Stand" class="Actions" onclick="stand()">Stand</button>
        </div>
        <div id="centerColumn">
            <p class="cardTitles">House Cards</p>
            <div id="cards">
                <div class="card" id="card1">
                    <p class="TLsuit" id="TLsuit0">♠</p>
                    <p class="Num" id="Num0">A</p>
                    <p class="BRsuit" id="BRsuit0">♠</p>
                </div>
                <div class="card" id="card2">
                    <p class="TLsuit" id="TLsuit1">?</p>
                    <p class="Num" id="Num1">?</p>
                    <p class="BRsuit" id="BRsuit1">?</p>
                </div>
            </div>            
            <p class="cardTitles">Your Cards</p>
            <p id="YourScore">##</p>                
            <div id="YourCards">
                <div class="card" id="card3">
                    <p class="TLsuit" id="TLsuit2">♠</p>
                    <p class="Num" id="Num2">A</p>
                    <p class="BRsuit" id="BRsuit2">♠</p>
                </div>

                <div class="card" id="card4">
                    <p class="TLsuit" id="TLsuit3">♠</p>
                    <p class="Num" id="Num3">A</p>
                    <p class="BRsuit" id="BRsuit3">♠</p>
                </div>
                <div id="Newbuttons">
                </div>

            </div>
        </div>
        <div id="rightColumn">
            <p class="Right" id="Money">Money</p>
            <div id="BetButtons">
                <button class="Bet" onclick="bet(5)">5</button>
                <button class="Bet" onclick="bet(10)">10</button>
                <button class="Bet" onclick="bet(25)">25</button>
                <button class="Bet" onclick="bet(50)">50</button>
                <button class="Bet" onclick="bet(100)">100</button>
                <button class="Bet" onclick="allIn()">All In</button>
            </div>
            <div id="BetAmt">
                <p id="Bet">$0</p>
            </div>
            <p class="Right" id="BJConsole"></p>
        </div>
        <script src="blackjack.js"></script>
    </body>
</html>
